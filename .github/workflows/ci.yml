name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create virtual environment
        run: |
          uv venv --python ${{ matrix.python-version }}
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Run tests
        run: pytest --cov=llm_audit --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          # Repo upload token from a GitHub secret (CODECOV_TOKEN). codecov-action@v4 prefers a
          # token even for public repos; if the secret is unset it falls back to tokenless.
          token: ${{ secrets.CODECOV_TOKEN }}
          # fail_ci_if_error stays false so a Codecov hiccup never reds a green test run.
          fail_ci_if_error: false
